{% extends 'coach_templates/base.html' %}
{% block content %}
<div style="display:grid;grid-template-columns:1fr 1fr;gap:20px">
  <div class="card">
    <div class="card-title">提交请假申请</div>
    <form method="post">
      {% csrf_token %}
      <div class="form-group">
        <label>请假日期</label>
        <input type="date" name="leave_date" required>
      </div>
      <div class="form-group">
        <label>请假原因</label>
        <textarea name="leave_message" rows="4" placeholder="请说明请假原因..." required
          style="width:100%;padding:9px 12px;border:1px solid #ddd;border-radius:7px;font-size:14px;font-family:inherit;resize:vertical"></textarea>
      </div>
      <button type="submit" class="btn btn-primary">提交申请</button>
    </form>
  </div>
  <div class="card">
    <div class="card-title">我的请假记录</div>
    <table>
      <thead><tr><th>日期</th><th>原因</th><th>状态</th></tr></thead>
      <tbody>
        {% for l in leaves %}
        <tr>
          <td>{{ l.leave_date }}</td>
          <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">{{ l.leave_message }}</td>
          <td>
            {% if l.leave_status == 0 %}<span class="badge badge-warning">待审核</span>
            {% elif l.leave_status == 1 %}<span class="badge badge-success">已批准</span>
            {% else %}<span class="badge badge-danger">已拒绝</span>{% endif %}
          </td>
        </tr>
        {% empty %}
        <tr><td colspan="3" style="text-align:center;color:#aaa;padding:20px">暂无记录</td></tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</div>
{% endblock %}
