{% extends 'hod_templates/base.html' %}
{% block content %}
<div class="card" style="max-width:400px">
  <div class="card-title">添加班级</div>
  <form method="post">
    {% csrf_token %}
    <div class="form-group">
      <label>班级名称</label>
      <input type="text" name="name" placeholder="例：初级班、中级班、1段冲段班" required>
    </div>
    <div style="display:flex;gap:12px">
      <button type="submit" class="btn btn-primary">确认添加</button>
      <a href="/manage_class" class="btn" style="background:#eee;color:#444">取消</a>
    </div>
  </form>
</div>
{% endblock %}
