{% extends 'hod_templates/base.html' %}
{% block content %}
<div class="card" style="max-width:680px">
  <div class="card-title">编辑学员 — {{ student.admin.get_full_name }}</div>
  <form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    <div class="form-row">
      <div class="form-group">
        <label>姓（名字）</label>
        <input type="text" name="first_name" value="{{ student.admin.first_name }}" required>
      </div>
      <div class="form-group">
        <label>姓氏</label>
        <input type="text" name="last_name" value="{{ student.admin.last_name }}" required>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>邮箱</label>
        <input type="email" name="email" value="{{ student.admin.email }}">
      </div>
      <div class="form-group">
        <label>性别</label>
        <select name="gender">
          <option value="男" {% if student.gender == '男' %}selected{% endif %}>男</option>
          <option value="女" {% if student.gender == '女' %}selected{% endif %}>女</option>
          <option value="其他" {% if student.gender == '其他' %}selected{% endif %}>其他</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>所属班级</label>
        <select name="class_id">
          <option value="">-- 请选择 --</option>
          {% for c in classes %}
            <option value="{{ c.id }}" {% if student.class_level_id == c.id %}selected{% endif %}>
              {{ c.name }}
            </option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label>训练期</label>
        <select name="session_year_id">
          <option value="">-- 请选择 --</option>
          {% for s in sessions %}
            <option value="{{ s.id }}" {% if student.session_year_id == s.id %}selected{% endif %}>
              {{ s }}
            </option>
          {% endfor %}
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>当前段位</label>
        <select name="current_rank">
          {% for val, label in student.RANK_CHOICES %}
            <option value="{{ val }}" {% if student.current_rank == val %}selected{% endif %}>
              {{ label }}
            </option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label>地址</label>
        <input type="text" name="address" value="{{ student.address }}">
      </div>
    </div>
    <div class="form-group">
      <label>头像（留空则不更改）</label>
      {% if student.profile_pic %}
        <div style="margin-bottom:8px">
          <img src="{{ student.profile_pic.url }}" style="width:60px;height:60px;border-radius:50%;object-fit:cover">
        </div>
      {% endif %}
      <input type="file" name="profile_pic" accept="image/*">
    </div>
    <div style="display:flex;gap:12px">
      <button type="submit" class="btn btn-primary">保存修改</button>
      <a href="/manage_student" class="btn" style="background:#eee;color:#444">取消</a>
    </div>
  </form>
</div>
{% endblock %}
