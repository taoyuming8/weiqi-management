{% extends 'hod_templates/base.html' %}
{% block content %}
<div class="card" style="max-width:600px">
  <div class="card-title">编辑教练 — {{ coach.admin.get_full_name }}</div>
  <form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    <div class="form-row">
      <div class="form-group">
        <label>姓（名字）</label>
        <input type="text" name="first_name" value="{{ coach.admin.first_name }}" required>
      </div>
      <div class="form-group">
        <label>姓氏</label>
        <input type="text" name="last_name" value="{{ coach.admin.last_name }}" required>
      </div>
    </div>
    <div class="form-group">
      <label>邮箱</label>
      <input type="email" name="email" value="{{ coach.admin.email }}">
    </div>
    <div class="form-group">
      <label>地址</label>
      <input type="text" name="address" value="{{ coach.address }}">
    </div>
    <div class="form-group">
      <label>头像（留空则不更改）</label>
      {% if coach.profile_pic %}
        <div style="margin-bottom:8px">
          <img src="{{ coach.profile_pic.url }}" style="width:60px;height:60px;border-radius:50%;object-fit:cover">
        </div>
      {% endif %}
      <input type="file" name="profile_pic" accept="image/*">
    </div>
    <div style="display:flex;gap:12px">
      <button type="submit" class="btn btn-primary">保存修改</button>
      <a href="/manage_coach" class="btn" style="background:#eee;color:#444">取消</a>
    </div>
  </form>
</div>
{% endblock %}
