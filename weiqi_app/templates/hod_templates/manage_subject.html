{% extends 'hod_templates/base.html' %}
{% block content %}
<div class="card">
  <div class="card-title">
    课程列表
    <a href="/add_subject" class="btn btn-primary">＋ 添加课程</a>
  </div>
  <table>
    <thead>
      <tr><th>#</th><th>课程名称</th><th>所属班级</th><th>负责教练</th><th>操作</th></tr>
    </thead>
    <tbody>
      {% for s in subjects %}
      <tr>
        <td>{{ forloop.counter }}</td>
        <td>{{ s.name }}</td>
        <td>{{ s.class_level }}</td>
        <td>{{ s.coach|default:"未指定" }}</td>
        <td>
          <a href="/delete_subject/{{ s.id }}"
             onclick="return confirm('确认删除课程「{{ s.name }}」？')"
             class="btn btn-danger btn-sm">删除</a>
        </td>
      </tr>
      {% empty %}
      <tr><td colspan="5" style="text-align:center;color:#aaa;padding:30px">暂无课程</td></tr>
      {% endfor %}
    </tbody>
  </table>
</div>
{% endblock %}
