{% extends 'hod_templates/base.html' %}
{% block content %}
<div class="card" style="max-width:680px">
  <div class="card-title">添加学员</div>
  <form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    <div class="form-row">
      <div class="form-group">
        <label>姓（名字）</label>
        <input type="text" name="first_name" placeholder="例：三" required>
      </div>
      <div class="form-group">
        <label>姓氏</label>
        <input type="text" name="last_name" placeholder="例：张" required>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>用户名</label>
        <input type="text" name="username" placeholder="登录用户名" required>
      </div>
      <div class="form-group">
        <label>邮箱</label>
        <input type="email" name="email" placeholder="邮箱地址">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>密码</label>
        <input type="password" name="password" placeholder="登录密码" required>
      </div>
      <div class="form-group">
        <label>性别</label>
        <select name="gender">
          <option value="男">男</option>
          <option value="女">女</option>
          <option value="其他">其他</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>所属班级</label>
        <select name="class_id" required>
          <option value="">-- 请选择班级 --</option>
          {% for c in classes %}
            <option value="{{ c.id }}">{{ c.name }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label>训练期</label>
        <select name="session_year_id">
          <option value="">-- 请选择训练期 --</option>
          {% for s in sessions %}
            <option value="{{ s.id }}">{{ s }}</option>
          {% endfor %}
        </select>
      </div>
    </div>
    <div class="form-group">
      <label>地址</label>
      <input type="text" name="address" placeholder="联系地址">
    </div>
    <div class="form-group">
      <label>头像（可选）</label>
      <input type="file" name="profile_pic" accept="image/*">
    </div>
    <div style="display:flex;gap:12px;margin-top:8px">
      <button type="submit" class="btn btn-primary">确认添加</button>
      <a href="/manage_student" class="btn" style="background:#eee;color:#444">取消</a>
    </div>
  </form>
</div>
{% endblock %}
